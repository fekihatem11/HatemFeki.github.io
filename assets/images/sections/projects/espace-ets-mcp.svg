  <rect x="30" y="55" width="40" height="30" rx="2" stroke="#7EB8DA" stroke-width="3" fill="none"/>
  <line x1="37" y1="63" x2="63" y2="63" stroke="#7EB8DA" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="69" x2="58" y2="69" stroke="#7EB8DA" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="75" x2="53" y2="75" stroke="#7EB8DA" stroke-width="2" stroke-linecap="round"/>
  <!-- Connection from nodes down to document -->
  <line x1="50" y1="40" x2="50" y2="55" stroke="#7EB8DA" stroke-width="2" stroke-dasharray="3,2"/>
