<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Server/database node -->
  <rect x="18" y="20" width="28" height="20" rx="3" stroke="#7EB8DA" stroke-width="3" fill="none"/>
  <circle cx="26" cy="30" r="2.5" fill="#7EB8DA"/>
  <line x1="33" y1="28" x2="41" y2="28" stroke="#7EB8DA" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="33" x2="38" y2="33" stroke="#7EB8DA" stroke-width="2" stroke-linecap="round"/>
  <!-- AI brain node -->
  <rect x="54" y="20" width="28" height="20" rx="3" stroke="#7EB8DA" stroke-width="3" fill="none"/>
  <circle cx="68" cy="27" r="5" stroke="#7EB8DA" stroke-width="2" fill="none"/>
  <circle cx="68" cy="27" r="1.5" fill="#7EB8DA"/>
  <line x1="63" y1="27" x2="60" y2="27" stroke="#7EB8DA" stroke-width="1.5"/>
  <line x1="73" y1="27" x2="76" y2="27" stroke="#7EB8DA" stroke-width="1.5"/>
  <line x1="68" y1="22" x2="68" y2="35" stroke="#7EB8DA" stroke-width="1.5"/>
