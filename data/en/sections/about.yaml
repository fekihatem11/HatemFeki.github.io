summary: "I'm Hatem, a Software Engineering grad student at École de technologie supérieure (ÉTS) in Montréal. I've worked across the full software lifecycle, from sitting in requirements and conception sessions to writing the code to shipping it to production.\n\nMy work spans software engineering, DevOps, and AI automation. I love connecting the dots between these worlds. Whether it's designing integration pipelines, setting up CI/CD workflows, or leveraging cutting-edge AI tools like Claude Code and n8n to automate complex tasks, I'm drawn to solutions that are practical and actually ship."

